# getrandom 0.4 (pulled by ciris-crypto's ml-dsa -> rand_core 0.10) uses the
# 0.3+ backend-cfg system: the "wasm_js" cargo feature is necessary but NOT
# sufficient — it also requires this rustflag cfg to select the browser backend.
# Scoped to the wasm target so the native headless render build is untouched.
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
